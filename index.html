<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Felius Rescue Rangers</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f7f4f2; font-family: 'Covik Sans', sans-serif; }
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const B = {
      orange:"#ff5c35", pink:"#f5acb8", cream:"#fceae6",
      blue:"#8dc6e8", yellow:"#ffc629", dark:"#24272a", white:"#ffffff",
    };
    const H = (s) => ({ fontFamily:"'Covik Sans Bold' ,sans-serif", fontWeight:700, ...s });
    const T = (s) => ({ fontFamily:"'Covik Sans',sans-serif", ...s });

    function Bar({ label, value, max, color }) {
      const pct = Math.round((value / max) * 100);
      return (
        <div style={{ marginBottom:12 }}>
          <div style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:4, ...T() }}>
            <span>{label}</span><span style={{ color:"#6b7280" }}>{value.toLocaleString()} ({pct}%)</span>
          </div>
          <div style={{ background:"#e5e7eb", borderRadius:999, height:20 }}>
            <div style={{ width:`${pct}%`, background:color, height:"100%", borderRadius:999 }} />
          </div>
        </div>
      );
    }

    function SlideVisual({ slideId }) {
      if (slideId === "facts-where") return (
        <div style={{ marginTop:16 }}>
          <Bar label="🏠 Adopted" value={2100000} max={3200000} color={B.orange} />
          <Bar label="🔄 Returned to owners" value={570000} max={3200000} color={B.blue} />
          <Bar label="😿 Euthanized" value={530000} max={3200000} color={B.pink} />
          <img src="https://images.squarespace-cdn.com/content/65a18fdea1d38d21e97fdd66/3fcac38b-31f2-40ae-b00f-c0b80a0b8624/Steven-05_Small.jpg?content-type=image%2Fjpeg" alt="stray cat" style={{ width:"100%", borderRadius:12, marginTop:14 }} />
);
        </div>
      );
      if (slideId === "facts-progress") return (
        <div style={{ marginTop:16 }}>
          {[{y:"1970s",v:85,c:"#ff5c35"},{y:"2000s",v:45,c:B.orange},{y:"Today",v:17,c:"#8dc6e8"}].map(d => (
            <div key={d.y} style={{ marginBottom:12 }}>
              <div style={{ fontSize:13, marginBottom:4, ...H() }}>{d.y} — {d.v}% euthanized</div>
              <div style={{ background:"#e5e7eb", borderRadius:999, height:20 }}>
                <div style={{ width:`${d.v}%`, background:d.c, height:"100%", borderRadius:999, display:"flex", alignItems:"center", paddingLeft:10 }}>
                  <span style={{ color:"#fff", fontSize:12, ...H() }}>{d.v}%</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      );
      return null;
    }

    const TABS = [
      { id:"intro",   label:"Intro",     emoji:"🐱" },
      { id:"facts",   label:"Numbers",   emoji:"📊" },
      { id:"journey", label:"Journey",   emoji:"🏠" },
      { id:"roles",   label:"Heroes",    emoji:"🦸" },
      { id:"quiz",    label:"Quiz",      emoji:"🧠" },
      { id:"action",  label:"Be a Hero", emoji:"⭐" },
    ];

    const SLIDES = {
      intro: [
        { id:"intro-1", icon:"😿", color:B.orange, bg:B.cream, title:"Why Do Cats Need Help?", body:"Every year, millions of cats across the U.S. end up without a home. Some are lost, some are born on the streets, and some are given up by families who can no longer care for them.", callout:"💬 Think About It: Have you ever seen a stray cat? Where do you think it came from?" },
        { id:"intro-2", icon:"🏠", color:B.orange, bg:B.cream, title:"What Is Cat Rescue?", body:"Cat rescue is the amazing work done by shelters, volunteers, and everyday people — like YOU — to give cats a second chance at a happy, loving home.", callout:"🐾 Rescue Rangers are people of all ages who help cats find safety and love!" },
        { id:"intro-3", icon:"📉", color:B.orange, bg:B.cream, title:"The Good News", body:"Thanks to rescue efforts over the past 50 years, the number of cats euthanized in shelters has dropped by over 75%! That means rescue work REALLY makes a difference.", callout:"⭐ The more people who care, the more cats are saved. You can be part of this change!" },
        { id:"intro-4", icon:"🔢", color:B.orange, bg:B.cream, title:"The Numbers at a Glance", body:"Every year in the U.S.: 3.2 million cats enter shelters, 2.1 million are adopted into loving homes, 570,000 are returned to their owners, and sadly 530,000 are still euthanized.", callout:"🧮 That means roughly 65% of shelter cats find a home or owner — and that number keeps growing!" },
      ],
      facts: [
        { id:"facts-how",      icon:"😿", color:B.blue, bg:"#eaf5fc", title:"How Many Cats Need Help?",   body:"Roughly 3.2 million cats enter U.S. shelters every single year. That works out to one cat every 10 seconds!", callout:"⏱️ By the time you finish reading this card, another cat will have entered a shelter." },
        { id:"facts-where",    icon:"🏠", color:B.blue, bg:"#eaf5fc", title:"Where Do They Go?",          body:"Of the 3.2 million cats in shelters each year, most find a positive outcome — but not all.", callout:null },
        { id:"facts-over",     icon:"🐣", color:B.blue, bg:"#eaf5fc", title:"The Overpopulation Problem", body:"One unspayed female cat and her kittens can produce up to 420,000 cats over just 7 years if none are spayed or neutered. That's why spay & neuter programs are SO important!", callout:"🧮 Math Challenge: If a cat has 3 litters/year with 4 kittens each, how many kittens in 2 years? (Answer: 24!)" },
        { id:"facts-progress", icon:"📈", color:B.blue, bg:"#eaf5fc", title:"Progress Over Time",         body:"The euthanasia rate in U.S. shelters has dropped dramatically over the decades, proving that rescue efforts work!", callout:null },
        { id:"facts-why",      icon:"💡", color:B.blue, bg:"#eaf5fc", title:"What Changed?",              body:"The dramatic drop in euthanasia happened because of more shelters, widespread spay/neuter programs, online adoption listings, foster networks, and people like YOU who care.", callout:"💬 Discussion: Which change do you think had the biggest impact? Why?" },
      ],
      journey: [
        { id:"journey-1", icon:"🏚️", color:"#22c55e", bg:"#f0fdf4", title:"Step 1: Stray or Surrendered",   body:"A cat may be lost, born outside, or given up by an owner who can no longer care for them. Life outside is tough — cold, hungry, and dangerous.", callout:"🐾 Many kittens are born outside to stray moms and have never known a home." },
        { id:"journey-2", icon:"🚐", color:"#22c55e", bg:"#f0fdf4", title:"Step 2: Rescued & Intake",        body:"Animal control officers or kind volunteers bring the cat to a shelter or rescue group. The cat gets a health check, vaccinations, and a warm, safe place to sleep.", callout:"🩺 Intake staff record the cat's age, weight, and health so they can get the right care." },
        { id:"journey-3", icon:"🏥", color:"#22c55e", bg:"#f0fdf4", title:"Step 3: Vet Care & Spay/Neuter",  body:"Every cat gets medical treatment. Spaying or neutering is critical — without it, one cat can lead to hundreds of kittens in just a few years!", callout:"💉 Many rescue groups offer free or low-cost spay/neuter to help reduce overpopulation." },
        { id:"journey-4", icon:"🏡", color:"#22c55e", bg:"#f0fdf4", title:"Step 4: Foster Home",             body:"Many cats go to temporary foster families while they wait for adoption. Foster homes help shy cats feel safe and free up shelter space for more rescues.", callout:"❤️ Even a few weeks in a loving foster home can transform a scared cat into an adoptable one!" },
        { id:"journey-5", icon:"📸", color:"#22c55e", bg:"#f0fdf4", title:"Step 5: Adoption Listing",        body:"Cute photos and a bio are posted online and on social media. A great profile can get a cat adopted in just days — sometimes even hours!", callout:"📱 Shelters use Instagram, Facebook, and TikTok to reach thousands of potential adopters." },
        { id:"journey-6", icon:"❤️", color:"#22c55e", bg:"#f0fdf4", title:"Step 6: Forever Home!",           body:"A family falls in love and adopts! The cat gets microchipped for safety and goes home with food, toys, and a family who will love them forever.", callout:"🎉 Adoption day is a celebration for the whole shelter — every cat deserves this moment!" },
      ],
      roles: [
        { id:"roles-1", icon:"🏠",  color:B.pink, bg:"#fdf2f8", title:"Foster Families",          body:"Foster families open their homes to cats temporarily — especially important for kittens and sick cats who need extra one-on-one care that shelters can't always provide.", callout:"🐱 You don't need a huge house — just a spare room and a big heart!" },
        { id:"roles-2", icon:"🩺",  color:B.pink, bg:"#fdf2f8", title:"Shelter Vets & Vet Techs", body:"Shelter veterinarians provide medical care, surgeries, and vaccinations to hundreds of cats. Many work for reduced pay because they're passionate about animal welfare.", callout:"🎓 If you love animals AND science, becoming a vet could be your superpower!" },
        { id:"roles-3", icon:"📣",  color:B.pink, bg:"#fdf2f8", title:"Volunteers",                body:"Volunteers socialize cats, clean enclosures, take adoption photos, drive cats to vet appointments, and so much more. They are the backbone of every rescue operation.", callout:"⭐ Many shelters accept young volunteers with a parent — ask yours!" },
        { id:"roles-4", icon:"💰",  color:B.pink, bg:"#fdf2f8", title:"Donors",                    body:"Cat rescue costs real money — food, medicine, surgery, and shelter facilities all add up. Generous donors make it possible for rescues to keep their doors open.", callout:"🎪 Bake sales, school fundraisers, and donation drives are ways kids can help raise funds!" },
        { id:"roles-5", icon:"🏛️", color:B.pink, bg:"#fdf2f8", title:"Animal Control Officers",  body:"These first responders rescue stray and injured animals, respond to cruelty reports, and bring cats to safety. They enforce animal welfare laws in their communities.", callout:"🚨 Animal control officers are like superheroes for animals — they respond 24/7!" },
        { id:"roles-6", icon:"👨‍💻", color:B.pink, bg:"#fdf2f8", title:"Social Media Advocates",   body:"Sharing adoptable cat posts online can travel thousands of miles and find the perfect family. One viral post has been known to get a cat adopted within hours!", callout:"📲 Ask a grown-up to help you share a shelter cat's adoption post today!" },
      ],
      action: [
        { id:"action-1", icon:"📢", color:B.yellow, bg:"#fffbeb", title:"Spread the Word",       body:"Share adoption posts on social media or tell your family and friends about cats at your local shelter. Awareness is the first step to rescue!", callout:"💬 Challenge: Can you tell 5 people this week about cat rescue?" },
        { id:"action-2", icon:"🧸", color:B.yellow, bg:"#fffbeb", title:"Donate Supplies",       body:"Shelters always need cat food, blankets, litter, and toys. Organize a supply drive at your school and make a real difference for cats in need.", callout:"📦 Call your local shelter first to ask what they need most right now." },
        { id:"action-3", icon:"🎨", color:B.yellow, bg:"#fffbeb", title:"Make Adoption Posters", body:"Draw or design creative posters for cats at your local shelter and ask stores, libraries, or community boards to display them.", callout:"🖍️ The more creative, the better — bright colors catch people's eyes!" },
        { id:"action-4", icon:"💌", color:B.yellow, bg:"#fffbeb", title:"Write Thank-You Cards", body:"Send heartfelt cards to shelter volunteers and staff. Knowing their work is appreciated keeps them motivated to save more cats.", callout:"✏️ A simple 'Thank you for saving cats!' can make someone's whole day." },
        { id:"action-5", icon:"🏡", color:B.yellow, bg:"#fffbeb", title:"Ask About Fostering",   body:"Talk to your parents! Many families can foster kittens — it's temporary, incredibly rewarding, and teaches kids so much about compassion and responsibility.", callout:"🐾 Fostering a litter of kittens is one of the most magical experiences a family can have!" },
        { id:"action-6", icon:"🐾", color:B.yellow, bg:"#fffbeb", title:"Adopt, Don't Shop",     body:"When your family is ready for a pet, choose adoption from a shelter or rescue over buying from a breeder or pet store. Millions of amazing cats are waiting!", callout:"❤️ Every adoption saves TWO lives — the cat you take home, and the space it frees for another." },
      ],
    };

    const QS = [
      { q:"How many cats enter U.S. shelters every year?", opts:["~500,000","~3.2 million","~100,000","~10 million"], ans:1, fact:"Roughly 3.2 million cats enter U.S. shelters each year — that's one cat every 10 seconds!" },
      { q:"What does a 'no-kill' shelter save?", opts:["50% of animals","75% of animals","At least 90% of animals","Only kittens"], ans:2, fact:"A no-kill shelter saves 90%+ of its animals by finding homes, fosters, or transfers." },
      { q:"What is a 'foster home' for a cat?", opts:["A permanent home","A pet store","A temp home while waiting for adoption","A vet clinic"], ans:2, fact:"Foster families care for cats temporarily — freeing shelter space and helping cats feel safe!" },
      { q:"What does TNR stand for?", opts:["Train, Nurture, Release","Trap, Neuter, Return","Tag, Name, Register","Track, Notify, Rescue"], ans:1, fact:"TNR helps manage stray populations humanely — trap, spay/neuter, then return to their territory." },
    ];

    function Quiz() {
      const [qi, setQi] = useState(0);
      const [sel, setSel] = useState(null);
      const [score, setScore] = useState(0);
      const [done, setDone] = useState(false);

      const pick = (i) => { if (sel !== null) return; setSel(i); if (i === QS[qi].ans) setScore(s => s+1); };
      const next = () => { if (qi+1 >= QS.length) setDone(true); else { setQi(q => q+1); setSel(null); } };
      const reset = () => { setQi(0); setSel(null); setScore(0); setDone(false); };

      if (done) return (
        <div style={{ background:B.white, borderRadius:20, padding:32, textAlign:"center", boxShadow:"0 4px 16px rgba(0,0,0,0.06)" }}>
          <div style={{ fontSize:64 }}>{score===4?"🏆":score>=2?"⭐":"💪"}</div>
          <div style={{ fontSize:28, color:B.orange, margin:"12px 0 8px", ...H() }}>{score} / {QS.length}</div>
          <div style={{ color:"#4b5563", marginBottom:20, ...T() }}>{score===4?"Perfect! You're a true Rescue Ranger!":score>=2?"Great work — keep it up!":"Keep learning — every fact helps save a cat!"}</div>
          <button onClick={reset} style={{ padding:"12px 28px", background:B.orange, color:B.white, border:"none", borderRadius:999, fontSize:15, cursor:"pointer", ...H() }}>Try Again 🔄</button>
        </div>
      );

      const q = QS[qi];
      return (
        <div style={{ background:B.white, borderRadius:20, padding:24, boxShadow:"0 4px 16px rgba(0,0,0,0.06)" }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:12 }}>
            <span style={{ fontSize:13, color:"#6b7280", ...T() }}>Question {qi+1} of {QS.length}</span>
            <span style={{ fontSize:13, color:B.orange, ...H() }}>Score: {score}</span>
          </div>
          <div style={{ background:B.cream, borderRadius:12, padding:16, marginBottom:18 }}>
            <div style={{ fontSize:16, color:B.dark, ...H() }}>{q.q}</div>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:16 }}>
            {q.opts.map((opt,i) => {
              let bg="#f9fafb", border="#e5e7eb", col=B.dark;
              if (sel!==null) {
                if (i===q.ans) { bg="#f0fdf4"; border="#22c55e"; col="#166534"; }
                else if (i===sel) { bg="#fef2f2"; border="#ef4444"; col="#991b1b"; }
              }
              return (
                <button key={i} onClick={() => pick(i)} style={{ padding:"12px 16px", borderRadius:12, border:`2px solid ${border}`, background:bg, color:col, fontSize:14, textAlign:"left", cursor:sel===null?"pointer":"default", ...T() }}>
                  {["A","B","C","D"][i]}. {opt}
                </button>
              );
            })}
          </div>
          {sel!==null && <>
            <div style={{ background:"#fffbeb", borderRadius:12, padding:14, borderLeft:`4px solid ${B.yellow}`, marginBottom:14, ...T() }}>
              <span style={{ ...H() }}>💡 Did you know? </span>{q.fact}
            </div>
            <button onClick={next} style={{ width:"100%", padding:12, background:B.orange, color:B.white, border:"none", borderRadius:999, fontSize:15, cursor:"pointer", ...H() }}>
              {qi+1<QS.length?"Next Question →":"See My Score!"}
            </button>
          </>}
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState("intro");
      const [idxMap, setIdxMap] = useState({ intro:0, facts:0, journey:0, roles:0, action:0 });

      const switchTab = (t) => { setTab(t); setIdxMap(prev => ({ ...prev, [t]:0 })); };
      const go = (delta) => {
        setIdxMap(prev => {
          const slides = SLIDES[tab];
          const next = Math.min(Math.max(prev[tab] + delta, 0), slides.length - 1);
          return { ...prev, [tab]: next };
        });
      };

      const renderContent = () => {
        if (tab === "quiz") return <Quiz />;
        const slides = SLIDES[tab];
        const idx = idxMap[tab];
        const slide = slides[idx];
        const total = slides.length;
        const ac = slide.color;
        return (
          <div>
            <div style={{ background:B.white, borderRadius:20, padding:"24px 20px", boxShadow:"0 4px 16px rgba(0,0,0,0.06)", minHeight:220, border:`2px solid ${ac}22` }}>
              <div style={{ display:"inline-block", background:ac, color:B.white, borderRadius:999, padding:"3px 14px", fontSize:12, marginBottom:12, ...H() }}>{idx+1} / {total}</div>
              {slide.icon && <div style={{ fontSize:40, marginBottom:8 }}>{slide.icon}</div>}
              <div style={{ fontSize:19, color:B.dark, marginBottom:8, ...H() }}>{slide.title}</div>
              <div style={{ fontSize:14, color:"#4b5563", lineHeight:1.7, ...T() }}>{slide.body}</div>
              <SlideVisual slideId={slide.id} />
              {slide.callout && (
                <div style={{ marginTop:16, background:slide.bg, borderRadius:12, padding:"10px 14px", borderLeft:`4px solid ${ac}`, fontSize:13, color:B.dark, ...T() }}>
                  {slide.callout}
                </div>
              )}
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:14 }}>
              <button onClick={() => go(-1)} disabled={idx===0}
                style={{ padding:"9px 20px", borderRadius:999, border:"none", background:idx===0?"#e5e7eb":ac, color:idx===0?"#9ca3af":B.white, fontSize:14, cursor:idx===0?"default":"pointer", ...H() }}>
                ← Back
              </button>
              <div style={{ display:"flex", gap:6 }}>
                {slides.map((_,i) => (
                  <div key={i} onClick={() => setIdxMap(prev=>({...prev,[tab]:i}))}
                    style={{ width:i===idx?20:9, height:9, borderRadius:999, background:i===idx?ac:"#d1d5db", cursor:"pointer", transition:"all .3s" }} />
                ))}
              </div>
              <button onClick={() => go(1)} disabled={idx===total-1}
                style={{ padding:"9px 20px", borderRadius:999, border:"none", background:idx===total-1?"#e5e7eb":ac, color:idx===total-1?"#9ca3af":B.white, fontSize:14, cursor:idx===total-1?"default":"pointer", ...H() }}>
                Next →
              </button>
            </div>
          </div>
        );
      };

      return (
        <div style={{ background:"#f7f4f2", minHeight:"100vh", maxWidth:680, margin:"0 auto", padding:"16px 12px", ...T() }}>
          <div style={{ display:"flex", flexWrap:"wrap", gap:7, marginBottom:18, justifyContent:"center" }}>
            {TABS.map(t => (
              <button key={t.id} onClick={() => switchTab(t.id)}
                style={{ padding:"9px 15px", borderRadius:999, border:`2px solid ${tab===t.id?B.orange:"#d1d5db"}`, background:tab===t.id?B.orange:B.white, color:tab===t.id?B.white:B.dark, fontSize:13, cursor:"pointer", transition:"all .2s", ...(tab===t.id?H():T()) }}>
                {t.emoji} {t.label}
              </button>
            ))}
          </div>
          {renderContent()}
          <div style={{ textAlign:"center", marginTop:20, fontSize:11, color:"#9ca3af", ...T() }}>
            Data: ASPCA & Shelter Animals Count (2023–24) • Felius Rescue Rangers © 2026
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
